name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Validate Node.js syntax
        working-directory: backend
        run: |
          node --check server.js
          find src -type f -name '*.js' -exec node --check {} \;

  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

  validate-worker:
    name: Validate Python worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install worker dependencies
        working-directory: worker
        run: pip install -r requirements.txt

      - name: Validate Python syntax
        working-directory: worker
        run: python -m compileall .

  validate-infrastructure:
    name: Validate Docker and deployment configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for YAML validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install YAML parser
        run: pip install PyYAML==6.0.2

      - name: Validate YAML syntax
        run: >-
          python -c "import pathlib, yaml;
          files=[p for p in pathlib.Path('.').rglob('*') if p.suffix in ('.yml','.yaml') and 'node_modules' not in p.parts];
          [list(yaml.safe_load_all(p.read_text(encoding='utf-8'))) for p in files];
          print(f'Validated {len(files)} YAML files')"

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Render Kubernetes manifests
        run: kustomize build infrastructure/kubernetes > /dev/null

      - name: Validate Argo CD manifest path
        run: test -f infrastructure/argocd/application.yaml

  build-and-push-images:
    name: Build${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && ' and push' || '' }} images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - validate-backend
      - validate-frontend
      - validate-worker
      - validate-infrastructure
    env:
      IMAGE_NAMESPACE: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.DOCKERHUB_USERNAME || 'local' }}
      SHOULD_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ env.SHOULD_PUSH == 'true' }}
          build-args: VITE_API_URL=/api
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/ai-task-frontend:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/ai-task-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/ai-task-backend:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/ai-task-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: worker
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/ai-task-worker:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/ai-task-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  update-kubernetes-manifests:
    name: Update Kubernetes image tags
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push-images
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update immutable image tags
        working-directory: infrastructure/kubernetes
        env:
          REGISTRY_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kustomize edit set image YOUR_DOCKERHUB_USERNAME/ai-task-frontend=$REGISTRY_USER/ai-task-frontend:$IMAGE_TAG
          kustomize edit set image YOUR_DOCKERHUB_USERNAME/ai-task-backend=$REGISTRY_USER/ai-task-backend:$IMAGE_TAG
          kustomize edit set image YOUR_DOCKERHUB_USERNAME/ai-task-worker=$REGISTRY_USER/ai-task-worker:$IMAGE_TAG
          kustomize build . > /dev/null

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infrastructure/kubernetes/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Kubernetes image tags are already current."
            exit 0
          fi
          git commit -m "chore: update deployment images [skip ci]"
          git push origin HEAD:main
